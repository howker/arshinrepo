version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: ["/app/docker/app/entrypoint.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - backend

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: ["/app/docker/app/entrypoint.sh", "celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - backend

  beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: ["/app/docker/app/entrypoint.sh", "celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arshin_mvp
      POSTGRES_USER: arshin
      POSTGRES_PASSWORD: arshin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arshin -d arshin_mvp"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2026-05-09T19-08-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  minio_data:

networks:
  backend:
    driver: bridge

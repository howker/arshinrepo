{% extends "base.html" %}

{% block title %}Главная - Arshin Checker{% endblock %}

{% block content %}
<div class="header-actions">
    <h1>Мои проверки</h1>
    <button id="upload-btn" class="btn-primary">Загрузить файл</button>
</div>

<div id="upload-section" style="display:none;" class="upload-section">
    <form id="upload-form" enctype="multipart/form-data">
        <input type="file" id="file-input" name="file" accept=".xlsx" required>
        <button type="submit">Отправить</button>
    </form>
    <div id="upload-status"></div>
</div>

<div id="jobs-list">
    <p>Загрузка...</p>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
console.log("🔵 index.html загружен");
const token = localStorage.getItem('token');
console.log("🔵 Токен из localStorage:", token);

if (!token) {
    console.log("🔴 Токен отсутствует, редирект на логин");
    window.location.href = '/login';
} else {
    console.log("✅ Токен есть, загружаем данные");
    // Загрузка списка заданий
    fetch('/api/jobs', {
        headers: {'Authorization': `Bearer ${token}`}
    })
    .then(res => {
        if (!res.ok) throw new Error('Ошибка загрузки');
        return res.json();
    })
    .then(jobs => {
        console.log("📦 Jobs:", jobs);
        const list = document.getElementById('jobs-list');
        if (jobs.length === 0) {
            list.innerHTML = '<p>Нет заданий</p>';
        } else {
            let html = '<ul>';
            jobs.forEach(job => {
                html += `<li><a href="/jobs/${job.id}">${job.source_filename} (${job.status})</a></li>`;
            });
            html += '</ul>';
            list.innerHTML = html;
        }
    })
    .catch(err => {
        console.error("❌ Ошибка загрузки заданий:", err);
        document.getElementById('jobs-list').innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
    });
}

// Загрузка файла
document.getElementById('upload-btn').addEventListener('click', () => {
    document.getElementById('upload-section').style.display = 'block';
});

document.getElementById('upload-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const statusDiv = document.getElementById('upload-status');
    statusDiv.textContent = 'Загрузка...';

    try {
        const resp = await fetch('/api/jobs/upload', {
            method: 'POST',
            headers: {'Authorization': `Bearer ${token}`},
            body: formData
        });
        const result = await resp.json();
        if (resp.ok) {
            statusDiv.textContent = '✅ Файл загружен!';
            setTimeout(() => window.location.reload(), 1500);
        } else {
            statusDiv.textContent = '❌ Ошибка: ' + (result.detail || 'неизвестная');
        }
    } catch (err) {
        statusDiv.textContent = '❌ Ошибка сети';
        console.error(err);
    }
});
</script>
{% endblock %}

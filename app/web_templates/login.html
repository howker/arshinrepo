{% extends "base.html" %}
{% block title %}Вход — Сверка с Аршином{% endblock %}
{% block masthead %}{% endblock %}

{% block content %}
<div class="gate">
  <div class="panel">
    <h1>Сверка с Аршином</h1>
    <p class="subtitle">Проверка ведомостей СИ по государственному реестру</p>

    <div class="tabs" role="tablist">
      <button id="tab-login" role="tab" aria-selected="true">Вход</button>
      <button id="tab-register" role="tab" aria-selected="false">Регистрация</button>
    </div>

    <div id="msg"></div>

    <form id="form" onsubmit="return false;">
      <div class="field" id="name-field" style="display:none;">
        <label for="full_name">Имя и фамилия</label>
        <input type="text" id="full_name" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Рабочая почта</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" required autocomplete="current-password">
        <p class="hint" id="pw-hint" style="display:none; font-size:13px; color:#8B9199; margin:6px 0 0;">
          Не короче 8 символов
        </p>
      </div>
      <button type="submit" id="submit" style="width:100%;">Войти</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
if (localStorage.getItem('token')) window.location.href = '/';

let mode = 'login';
const $ = (id) => document.getElementById(id);

function setMode(next) {
  mode = next;
  const isReg = mode === 'register';
  $('tab-login').setAttribute('aria-selected', String(!isReg));
  $('tab-register').setAttribute('aria-selected', String(isReg));
  $('name-field').style.display = isReg ? 'block' : 'none';
  $('pw-hint').style.display = isReg ? 'block' : 'none';
  $('submit').textContent = isReg ? 'Создать учётную запись' : 'Войти';
  $('password').autocomplete = isReg ? 'new-password' : 'current-password';
  $('msg').innerHTML = '';
}
$('tab-login').onclick = () => setMode('login');
$('tab-register').onclick = () => setMode('register');

$('form').addEventListener('submit', async () => {
  const btn = $('submit');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = mode === 'register' ? 'Создаём…' : 'Проверяем…';
  $('msg').innerHTML = '';

  const body = { email: $('email').value.trim(), password: $('password').value };
  if (mode === 'register' && $('full_name').value.trim()) {
    body.full_name = $('full_name').value.trim();
  }

  try {
    const res = await fetch('/api/auth/' + mode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      localStorage.setItem('token', data.access_token);
      window.location.href = '/';
      return;
    }

    let text = data.detail;
    if (Array.isArray(text)) text = text.map(e => e.msg).join('; ');
    if (!text) text = 'Не удалось выполнить запрос';
    if (res.status === 401) text = 'Неверная почта или пароль';
    $('msg').innerHTML = '<div class="notice error"></div>';
    $('msg').firstChild.textContent = text;
  } catch (err) {
    $('msg').innerHTML = '<div class="notice error">Сервер недоступен. Попробуйте ещё раз.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
});
</script>
{% endblock %}

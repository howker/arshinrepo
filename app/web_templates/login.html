{% extends "base.html" %}

{% block title %}Вход - Arshin Checker{% endblock %}

{% block content %}
<div class="login-container">
    <h1>Вход в систему</h1>
    <form id="login-form" method="post" action="/api/auth/login">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Войти</button>
        <div id="login-error" class="error-message" style="display:none;"></div>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await resp.json();
        if (resp.ok) {
            localStorage.setItem('token', result.access_token);
            window.location.href = '/';
        } else {
            document.getElementById('login-error').textContent = result.detail || 'Ошибка входа';
            document.getElementById('login-error').style.display = 'block';
        }
    } catch (err) {
        document.getElementById('login-error').textContent = 'Ошибка сети';
        document.getElementById('login-error').style.display = 'block';
    }
});
</script>
{% endblock %}

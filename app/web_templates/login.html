{% extends "base.html" %}

{% block title %}Вход - Arshin Checker{% endblock %}

{% block content %}
<div class="login-container">
    <h1>Вход в систему</h1>
    <form id="login-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Войти</button>
        <div id="login-error" style="color:red; display:none;"></div>
    </form>
</div>
<script>
console.log("🔵 Скрипт логина загружен");
document.addEventListener('DOMContentLoaded', function() {
    console.log("🔵 DOM загружен, ищем форму");
    const form = document.getElementById('login-form');
    console.log("🔵 Форма:", form);
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        console.log("🔵 Submit событие поймано!");
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        console.log("📧 Email:", email);
        fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        })
        .then(res => {
            console.log("📡 Response status:", res.status);
            return res.json();
        })
        .then(data => {
            console.log("📦 Data:", data);
            if (data.access_token) {
                localStorage.setItem('token', data.access_token);
                console.log("✅ Токен сохранён, редирект...");
                window.location.href = '/';
            } else {
                document.getElementById('login-error').textContent = data.detail || 'Ошибка входа';
                document.getElementById('login-error').style.display = 'block';
            }
        })
        .catch(err => {
            console.error("❌ Ошибка:", err);
            document.getElementById('login-error').textContent = 'Ошибка сети';
            document.getElementById('login-error').style.display = 'block';
        });
    });
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Arshin Checker{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">Arshin Checker</a>
            <div class="nav-links">
                {% if user %}
                    <span>{{ user.email }}</span>
                    <a href="/logout">Выйти</a>
                {% else %}
                    <a href="/login">Войти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 Arshin Excel Checker</p>
        </div>
    </footer>
    <script src="/static/js/app.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
